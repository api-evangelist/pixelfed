      responses:
        '200':
          description: Media attachment (already processed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAttachment'
        '202':
          description: Media attachment (still processing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAttachment'
        '401':
          $ref: '#/components/responses/Unauthorized'
