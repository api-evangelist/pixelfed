  /v1.1/push/update-subscription:
    post:
      operationId: updatePushSubscription
      summary: Update Web Push subscription
      description: Creates or updates a Web Push notification subscription.
      tags: [Push Notifications]
      security:
        - OAuth2: [push]
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription]
              properties:
                subscription:
                  type: object
                  required: [endpoint, keys]
                  properties:
                    endpoint:
                      type: string
                      format: uri
                    keys:
                      type: object
                      properties:
                        p256dh:
                          type: string
                        auth:
                          type: string
                data:
                  type: object
                  properties:
                    alerts:
                      type: object
                      properties:
                        follow:
                          type: boolean
                        favourite:
                          type: boolean
                        reblog:
                          type: boolean
                        mention:
                          type: boolean
                        poll:
                          type: boolean
      responses:
        '200':
          description: Push subscription object
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
