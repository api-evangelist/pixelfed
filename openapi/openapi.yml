  # ── Search ──────────────────────────────────────────────────────────────────
  /v2/search:
    get:
      operationId: search
      summary: Search
      description: >
        Full-text search across accounts, statuses, and hashtags.
        At least one of the following must be true: the authenticated user has
        search permissions, or the q value contains only hashtags.
      tags: [Search]
      security:
        - OAuth2: [read]
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: type
          in: query
          schema:
            type: string
            enum: [accounts, statuses, hashtags]
          description: Restrict results to a specific entity type
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/maxIdParam'
        - $ref: '#/components/parameters/minIdParam'
        - name: resolve
          in: query
          schema:
            type: boolean
        - name: following
          in: query
          schema:
            type: boolean
        - name: account_id
          in: query
          schema:
            type: string
        - name: exclude_unreviewed
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
                  statuses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Status'
                  hashtags:
                    type: array
                    items:
