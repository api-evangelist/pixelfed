          multipart/form-data:
            schema:
              type: object
              properties:
                thumbnail:
                  type: string
                  format: binary
                description:
                  type: string
                focus:
                  type: string
      responses:
        '200':
          description: Updated media attachment object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAttachment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v2/media:
    post:
      operationId: uploadMediaV2
      summary: Upload media (v2, asynchronous)
      description: >
        Upload a media attachment asynchronously. Returns 202 if still processing,
        or 200 when ready. Poll GET /api/v1/media/{id} to check processing status.
      tags: [Media]
      security:
        - OAuth2: [write]
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
